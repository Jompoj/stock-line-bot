name: Run Stock Bot

on:
  schedule:
    - cron: '0 5 * * *'   # 12:00 ไทย
    - cron: '0 17 * * *'  # 00:00 ไทย
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 🔥 เพิ่มตัวนี้ (สำคัญ)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 debug กันพลาด (แนะนำ)
      - name: Show files
        run: ls -la

      - name: Run bot
        run: python elonBot.py
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
